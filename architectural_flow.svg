<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1050" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Definitions for Gradients, Shadows, Filters -->
  <defs>
    <!-- Card Gradients (kept vibrant for high-contrast on light background) -->
    <linearGradient id="input-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="norm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#5c24ff" />
    </linearGradient>
    <linearGradient id="cdss-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="output-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <!-- Soft Box Shadow for Light Background -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    
    <!-- Markers for Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b5cf6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Title Section (Modified for white background) -->
  <g transform="translate(50, 40)">
    <text x="0" y="25" fill="#0f172a" font-size="24" font-weight="800" letter-spacing="-0.025em">GENEPATH AI</text>
    <text x="0" y="50" fill="#5c24ff" font-size="14" font-weight="600" letter-spacing="0.05em">ARCHITECTURAL DATA FLOW PIPELINE</text>
    <text x="0" y="70" fill="#475569" font-size="12" font-weight="400">High-Throughput Pathogenicity Inference &amp; Pharmacogenomic CDSS</text>
  </g>

  <!-- Pipeline Steps -->

  <!-- STEP 1: Input & Parsing -->
  <g transform="translate(340, 150)" filter="url(#shadow)">
    <rect width="320" height="90" rx="16" fill="url(#input-grad)" />
    <!-- Step Badge -->
    <rect x="20" y="-12" width="60" height="24" rx="12" fill="#1e3a8a" />
    <text x="50" y="4" fill="#93c5fd" font-size="10" font-weight="800" text-anchor="middle">STEP 01</text>
    
    <text x="25" y="35" fill="#ffffff" font-size="15" font-weight="700">Input &amp; Parsing</text>
    <text x="25" y="55" fill="#bfdbfe" font-size="11" font-weight="500">Client submits hg38 coordinates</text>
    <text x="25" y="70" fill="#ffffff" font-size="10" font-family="'JetBrains Mono', monospace" opacity="0.9">Chr, Position, Ref/Alt alleles</text>
  </g>

  <!-- Connector 1 -> 2 -->
  <path d="M 500 240 L 500 290" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#arrow)" />

  <!-- STEP 2: Coordinate Normalization -->
  <g transform="translate(340, 300)" filter="url(#shadow)">
    <rect width="320" height="90" rx="16" fill="url(#norm-grad)" />
    <!-- Step Badge -->
    <rect x="20" y="-12" width="60" height="24" rx="12" fill="#4c1d95" />
    <text x="50" y="4" fill="#c4b5fd" font-size="10" font-weight="800" text-anchor="middle">STEP 02</text>
    
    <text x="25" y="35" fill="#ffffff" font-size="15" font-weight="700">Coordinate Normalization</text>
    <text x="25" y="55" fill="#ddd6fe" font-size="11" font-weight="500">Structures HGVS coordinate notation</text>
    <text x="25" y="72" fill="#ffffff" font-size="10" font-family="'JetBrains Mono', monospace" opacity="0.9">https://myvariant.info/v1/variant</text>
  </g>

  <!-- Connector 2 -> 3 (Branching) -->
  <path d="M 500 390 L 500 420" fill="none" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrow-purple)" />
  <path d="M 500 420 L 210 420 L 210 450" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 500 420 L 790 420 L 790 450" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 500 420 L 500 450" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- STEP 3: Parallel Processing Layer (Light boundary box) -->
  <rect x="50" y="440" width="900" height="210" rx="24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 6" />
  <text x="70" y="468" fill="#475569" font-size="12" font-weight="700" letter-spacing="0.05em">STEP 03: PARALLEL PROCESSING LAYER</text>

  <!-- 3A: Variant ID Resolution -->
  <g transform="translate(80, 490)" filter="url(#shadow)">
    <rect width="260" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="20" y="30" fill="#0f172a" font-size="13" font-weight="700">Variant ID Resolution</text>
    <text x="20" y="55" fill="#475569" font-size="10.5" font-weight="400">Queries dbSNP &amp; ClinVar fields</text>
    <text x="20" y="72" fill="#475569" font-size="10.5" font-weight="400">within MyVariant API response to</text>
    <text x="20" y="89" fill="#475569" font-size="10.5" font-weight="400">resolve chromosome coords to</text>
    <text x="20" y="108" fill="#1d4ed8" font-size="11" font-weight="600" font-family="'JetBrains Mono', monospace">active dbSNP rsID</text>
  </g>

  <!-- 3B: In-Silico Feature Assembly -->
  <g transform="translate(370, 490)" filter="url(#shadow)">
    <rect width="260" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="20" y="30" fill="#0f172a" font-size="13" font-weight="700">In-Silico Feature Assembly</text>
    <text x="20" y="55" fill="#475569" font-size="10.5" font-weight="400">Retrieves scores: SIFT, PolyPhen2,</text>
    <text x="20" y="72" fill="#475569" font-size="10.5" font-weight="400">AlphaMissense, and gnomAD AF.</text>
    <text x="20" y="90" fill="#b91c1c" font-size="10.5" font-weight="600">Drops missing metrics to -1 floor</text>
    <text x="20" y="108" fill="#475569" font-size="10" font-weight="400">to safeguard matrix dimensions</text>
  </g>

  <!-- 3C: Local ML Execution -->
  <g transform="translate(660, 490)" filter="url(#shadow)">
    <rect width="260" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="20" y="30" fill="#0f172a" font-size="13" font-weight="700">Local ML Execution</text>
    <text x="20" y="55" fill="#475569" font-size="10.5" font-weight="400">Vectorizes features and loads</text>
    <text x="20" y="72" fill="#6d28d9" font-size="11" font-weight="600" font-family="'JetBrains Mono', monospace">genepath_model.pkl</text>
    <text x="20" y="90" fill="#475569" font-size="10.5" font-weight="400">Computes Random Forest class</text>
    <text x="20" y="108" fill="#475569" font-size="10.5" font-weight="400">probability under 0.636 threshold</text>
  </g>

  <!-- Connector 3 -> 4 (Merging) -->
  <path d="M 210 620 L 210 680 L 410 680 L 410 700" fill="none" stroke="#94a3b8" stroke-width="2" />
  <path d="M 790 620 L 790 680 L 590 680 L 590 700" fill="none" stroke="#94a3b8" stroke-width="2" />
  <path d="M 500 620 L 500 700" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)" />

  <!-- STEP 4: CDSS Layer -->
  <g transform="translate(320, 710)" filter="url(#shadow)">
    <rect width="360" height="110" rx="16" fill="url(#cdss-grad)" />
    <!-- Step Badge -->
    <rect x="20" y="-12" width="60" height="24" rx="12" fill="#1e1b4b" />
    <text x="50" y="4" fill="#a5b4fc" font-size="10" font-weight="800" text-anchor="middle">STEP 04</text>
    
    <text x="25" y="32" fill="#ffffff" font-size="15" font-weight="700">Clinical Decision Support (CDSS)</text>
    <text x="25" y="52" fill="#c7d2fe" font-size="11" font-weight="500">Queries PharmGKB API for drug dosing guidelines</text>
    <text x="25" y="69" fill="#e0e7ff" font-size="10" font-weight="400">Uses resolved gene symbol &amp; rsID coordinates</text>
    <text x="25" y="86" fill="#a5b4fc" font-size="10" font-weight="600">Extracts evidence levels, phenotypes, and directions</text>
  </g>

  <!-- Connector 4 -> 5 -->
  <path d="M 500 820 L 500 870" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" />

  <!-- STEP 5: Output Generation -->
  <g transform="translate(320, 880)" filter="url(#shadow)">
    <rect width="360" height="110" rx="16" fill="url(#output-grad)" />
    <!-- Step Badge -->
    <rect x="20" y="-12" width="60" height="24" rx="12" fill="#064e3b" />
    <text x="50" y="4" fill="#a7f3d0" font-size="10" font-weight="800" text-anchor="middle">STEP 05</text>
    
    <text x="25" y="32" fill="#ffffff" font-size="15" font-weight="700">Output Generation</text>
    <text x="25" y="52" fill="#a7f3d0" font-size="11" font-weight="500">Transmits a unified JSON payload to client</text>
    <text x="25" y="70" fill="#d1fae5" font-size="10" font-weight="400">Verdict (Pathogenic/Benign), confidence metrics,</text>
    <text x="25" y="86" fill="#34d399" font-size="10.5" font-weight="700">and actionable drug dosing guidelines</text>
  </g>
</svg>
