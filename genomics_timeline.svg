<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%" style="background-color: transparent; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Definitions for Canva-safe Markers -->
  <defs>
    <!-- Simple Solid Color Marker for Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#7c3aed" />
    </marker>
  </defs>

  <!-- Horizontal Timeline Spine -->
  <path d="M 60 250 L 1530 250" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- ==================== MILESTONE 1: dbSNP (1999) ==================== -->
  <!-- Node on Line -->
  <circle cx="150" cy="250" r="7" fill="#7c3aed" />
  <!-- Vertical Connector (Up) -->
  <path d="M 150 250 L 150 180" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 3" />
  <!-- Card -->
  <g>
    <rect x="40" y="70" width="220" height="110" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" />
    <text x="150" y="102" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">1999</text>
    <text x="150" y="122" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">dbSNP</text>
    <text x="150" y="140" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">Launched by NCBI as</text>
    <text x="150" y="154" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">central repository for</text>
    <text x="150" y="168" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">short genetic variations.</text>
  </g>

  <!-- ==================== MILESTONE 2: PharmGKB (2000) ==================== -->
  <!-- Node on Line -->
  <circle cx="410" cy="250" r="7" fill="#7c3aed" />
  <!-- Vertical Connector (Down) -->
  <path d="M 410 250 L 410 320" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 3" />
  <!-- Card -->
  <g>
    <rect x="300" y="320" width="220" height="110" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" />
    <text x="410" y="352" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">2000</text>
    <text x="410" y="372" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">PharmGKB</text>
    <text x="410" y="390" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">Pharmacogenomics database</text>
    <text x="410" y="404" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">linking genetic variations</text>
    <text x="410" y="418" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">directly to drug responses.</text>
  </g>

  <!-- ==================== MILESTONE 3: Human Genome Project (2003) [HIGHLIGHT] ==================== -->
  <!-- Highlight Double-Ring Node -->
  <circle cx="670" cy="250" r="11" fill="#7c3aed" />
  <circle cx="670" cy="250" r="6" fill="#ffffff" />
  <!-- Vertical Connector (Up) -->
  <path d="M 670 250 L 670 180" fill="none" stroke="#7c3aed" stroke-width="2.5" />
  <!-- Card -->
  <g>
    <rect x="560" y="70" width="220" height="110" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5" />
    <!-- Highlight Badge -->
    <rect x="635" y="58" width="70" height="18" rx="9" fill="#7c3aed" />
    <text x="670" y="71" fill="#ffffff" font-size="9" font-weight="800" text-anchor="middle">MILESTONE</text>
    
    <text x="670" y="105" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">2003</text>
    <text x="670" y="125" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">Human Genome Project</text>
    <text x="670" y="142" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">Completion of first draft</text>
    <text x="670" y="156" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">human reference genome</text>
    <text x="670" y="170" fill="#4f46e5" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">hg38 / GRCh38</text>
  </g>

  <!-- ==================== MILESTONE 4: ClinVar (2013) ==================== -->
  <!-- Node on Line -->
  <circle cx="930" cy="250" r="7" fill="#7c3aed" />
  <!-- Vertical Connector (Down) -->
  <path d="M 930 250 L 930 320" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 3" />
  <!-- Card -->
  <g>
    <rect x="820" y="320" width="220" height="110" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" />
    <text x="930" y="352" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">2013</text>
    <text x="930" y="372" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">ClinVar</text>
    <text x="930" y="390" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">NCBI archive relating human</text>
    <text x="930" y="404" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">variations to clinical significance</text>
    <text x="930" y="418" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">and associated phenotypes.</text>
  </g>

  <!-- ==================== MILESTONE 5: gnomAD (2017) ==================== -->
  <!-- Node on Line -->
  <circle cx="1190" cy="250" r="7" fill="#7c3aed" />
  <!-- Vertical Connector (Up) -->
  <path d="M 1190 250 L 1190 180" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 3" />
  <!-- Card -->
  <g>
    <rect x="1080" y="70" width="220" height="110" rx="12" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" />
    <text x="1190" y="102" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">2017</text>
    <text x="1190" y="122" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">gnomAD</text>
    <text x="1190" y="140" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">Large-scale population reference</text>
    <text x="1190" y="154" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">dataset aggregating exome and</text>
    <text x="1190" y="168" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">genome variation sequences.</text>
  </g>

  <!-- ==================== MILESTONE 6: AlphaMissense (2023) [HIGHLIGHT] ==================== -->
  <!-- Highlight Double-Ring Node -->
  <circle cx="1450" cy="250" r="11" fill="#7c3aed" />
  <circle cx="1450" cy="250" r="6" fill="#ffffff" />
  <!-- Vertical Connector (Down) -->
  <path d="M 1450 250 L 1450 320" fill="none" stroke="#7c3aed" stroke-width="2.5" />
  <!-- Card -->
  <g>
    <rect x="1340" y="320" width="220" height="110" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5" />
    <!-- Highlight Badge -->
    <rect x="1415" y="308" width="70" height="18" rx="9" fill="#7c3aed" />
    <text x="1450" y="321" fill="#ffffff" font-size="9" font-weight="800" text-anchor="middle">MILESTONE</text>

    <text x="1450" y="355" fill="#4c1d95" font-size="20" font-weight="800" text-anchor="middle">2023</text>
    <text x="1450" y="375" fill="#7c3aed" font-size="14.5" font-weight="700" text-anchor="middle">AlphaMissense</text>
    <text x="1450" y="392" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">Deep learning AI model by</text>
    <text x="1450" y="406" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">DeepMind predicting clinical effects</text>
    <text x="1450" y="420" fill="#475569" font-size="11" font-weight="500" text-anchor="middle">of missense variants.</text>
  </g>

  <!-- ==================== CAPTION ==================== -->
  <text x="800" y="475" fill="#475569" font-size="13" font-weight="600" text-anchor="middle" font-style="italic">Figure 2.1: Visual timeline mapping the evolution of clinical genomic databases and structural prediction algorithms, spanning from the completion of the Human Genome Project to the introduction of DeepMind's AlphaMissense.</text>
</svg>
